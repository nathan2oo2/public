<style>
  /* FOOTER STYLES - Self-contained */
  :root {
    --footer-bg: #000;
    --footer-border: #111;
    --text-dim: #8e9399;
    --accent: #4da3ff;
  }

  .site-footer {
    background: var(--footer-bg);
    border-top: 1px solid var(--footer-border);
    margin-top: 3rem;
  }

  .footer-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
  }

  .footer-left {
    flex: 1;
    min-width: 200px;
  }

  .footer-left p {
    color: var(--text-dim);
    font-size: 0.92rem;
    margin: 0;
  }

  .footer-right {
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .social-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: #1a1a1a;
    color: var(--text-dim);
    text-decoration: none;
    transition: all 0.2s ease;
    font-size: 1.2rem;
  }

  .social-link:hover {
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
  }

  @media (max-width: 768px) {
    .footer-container {
      padding: 1.5rem 1.25rem;
      flex-direction: column;
      gap: 1.5rem;
      text-align: center;
    }

    .footer-left {
      width: 100%;
      order: 1;
    }

    .footer-right {
      width: 100%;
      justify-content: center;
      order: 2;
    }
  }

  @media (max-width: 480px) {
    .footer-container {
      padding: 1rem 1rem;
      gap: 1rem;
    }

    .footer-right {
      gap: 0.75rem;
    }

    .social-link {
      width: 32px;
      height: 32px;
      font-size: 1rem;
    }
  }
</style>
