<style>
  /* HEADER STYLES - Self-contained */
  :root {
    --nav-bg: #000;
    --nav-border: #111;
    --accent: #4da3ff;
    --fg: #e6e6e6;
    --text-muted: #9aa0a6;
    --active-bg: #2b2b2b;
  }

  .site-nav {
    width: 100%;
    background-color: var(--nav-bg);
    border-bottom: 1px solid var(--nav-border);
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
  }

  .nav-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    padding: 0.5rem 2rem;
    position: relative;
  }

  .nav-left {
    display: flex;
    align-items: center;
    width: 100%;
  }

  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-icon {
    height: 60px;
    max-width: 150px;
    border-radius: 8px;
    object-fit: contain;
    display: block;
  }

  .nav-links {
    display: flex;
    gap: 0.6rem;
    list-style: none;
    margin-left: auto;
    align-items: center;
  }

  .nav-links a {
    color: #ccc;
    text-decoration: none;
    font-size: 0.95rem;
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    transition: all 0.2s ease;
    position: relative;
  }

  .nav-links a:hover {
    color: var(--accent);
    background: rgba(255, 255, 255, 0.04);
  }

  .nav-links a.active {
    color: var(--accent);
    background: rgba(77, 163, 255, 0.14);
    font-weight: 500;
    box-shadow: 0 0 0 1px rgba(77, 163, 255, 0.18);
  }

  .mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--fg);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0.5rem;
    margin-left: auto;
    transition: color 0.2s ease;
  }

  .mobile-menu-btn:hover {
    color: var(--accent);
  }

  .mobile-nav {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background-color: var(--nav-bg);
    padding: 1rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 999;
    overflow: clip;
    max-height: 0px;
    opacity: 0;
    transform: translateY(-8px);
    transition: max-height 260ms ease, opacity 200ms ease, transform 260ms ease;
    will-change: max-height, opacity, transform;
  }

  .mobile-nav[data-open="true"] {
    max-height: var(--mobile-nav-h, 320px);
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .mobile-nav {
      transition: none;
      transform: none;
    }
  }

  .mobile-nav a {
    padding: 0.75rem 0.9rem;
    color: var(--fg);
    text-decoration: none;
    border-radius: 10px;
    transition: 0.2s ease;
  }

  .mobile-nav a:hover {
    background: rgba(255, 255, 255, 0.04);
  }

  .mobile-nav a.active {
    background: var(--active-bg);
    color: #fff;
  }

  @media (max-width: 768px) {
    .nav-container {
      padding: 0.5rem 1rem;
    }

    .nav-links {
      display: none;
    }

    .mobile-menu-btn {
      display: block;
    }

    .logo-icon {
      height: 52px;
      max-width: 130px;
    }

    .mobile-nav {
      padding: 1rem;
    }
  }

  @media (max-width: 480px) {
    .nav-container {
      padding: 0.5rem 0.75rem;
    }
  }
</style>

<nav class="site-nav">
  <div class="nav-container">
    <div class="nav-left">
      <a href="#" class="logo" data-link="index.html">
        <img src="/images/nathan-logo.png" class="logo-icon" alt="Nathan Baptista">
      </a>

      <ul class="nav-links" id="main-nav-links">
        <li><a data-link="index.html">Home</a></li>
        <li><a data-link="mogache-goa/mogache-goa.html">Mogache Goa</a></li>
        <li><a data-link="projects/projects.html">Projects</a></li>
        <li><a data-link="contact/contact.html">Contact</a></li>
      </ul>
    </div>

    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>
  </div>

  <div class="mobile-nav" id="mobile-nav"></div>
</nav>

<script>
  (function() {
    // Get the root path from the calling page
    function getRootPath() {
      return document.body.dataset.root || ".";
    }

    function normalizePath(path) {
      return path.replace(/\\/g, "/").replace(/\/+/g, "/");
    }

    // Build mobile nav from desktop nav
    function buildMobileNav() {
      const desktopList = document.getElementById("main-nav-links");
      const mobileNav = document.getElementById("mobile-nav");
      if (!desktopList || !mobileNav) return;

      mobileNav.innerHTML = "";

      desktopList.querySelectorAll("a").forEach((link) => {
        const mobileLink = document.createElement("a");
        mobileLink.setAttribute("data-link", link.getAttribute("data-link") || "");
        mobileLink.textContent = link.textContent;
        mobileNav.appendChild(mobileLink);
      });
    }

    // Set href attributes from data-link
    function setLinks() {
      const root = getRootPath();

      document.querySelectorAll("[data-link]").forEach((el) => {
        const raw = el.getAttribute("data-link");
        if (!raw) return;
        const href = root === "." ? raw : normalizePath(`${root}/${raw}`);
        el.setAttribute("href", href);
      });
    }

    // Set active nav state
    function setActiveNav() {
      const currentPath = window.location.pathname.replace(/\/+$/, "") || "/";
      const currentNormalized = currentPath === "/" ? "/index.html" : currentPath;

      document.querySelectorAll(".nav-links a, .mobile-nav a").forEach((link) => {
        const href = link.getAttribute("href") || "";
        const linkUrl = new URL(href, window.location.origin);
        const linkPath = linkUrl.pathname.replace(/\/+$/, "") || "/";

        if (linkPath === currentNormalized) {
          link.classList.add("active");
        } else {
          link.classList.remove("active");
        }
      });
    }

    // Setup mobile menu interactions
    function setupMobileNav() {
      const btn = document.getElementById("mobile-menu-btn");
      const nav = document.getElementById("mobile-nav");
      if (!btn || !nav) return;

      btn.setAttribute("aria-controls", "mobile-nav");
      btn.setAttribute("aria-expanded", "false");

      function setNavHeightVar() {
        const wasHidden = nav.hidden;
        if (wasHidden) nav.hidden = false;
        nav.style.setProperty("--mobile-nav-h", `${nav.scrollHeight}px`);
        if (wasHidden) nav.hidden = true;
      }

      function openNav() {
        setNavHeightVar();
        nav.hidden = false;
        nav.dataset.open = "false";
        requestAnimationFrame(() => {
          nav.dataset.open = "true";
          btn.setAttribute("aria-expanded", "true");
        });
      }

      function closeNav(immediate = false) {
        if (immediate) {
          nav.dataset.open = "false";
          nav.hidden = true;
          btn.setAttribute("aria-expanded", "false");
          return;
        }

        if (nav.hidden) {
          nav.dataset.open = "false";
          btn.setAttribute("aria-expanded", "false");
          return;
        }

        nav.dataset.open = "false";
        btn.setAttribute("aria-expanded", "false");

        nav.addEventListener("transitionend", function handler(e) {
          if (e.target !== nav) return;
          nav.hidden = true;
        }, { once: true });
      }

      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = nav.dataset.open === "true" && !nav.hidden;
        if (isOpen) closeNav();
        else openNav();
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".site-nav")) closeNav();
      });

      nav.addEventListener("click", (e) => {
        if (e.target.closest("a")) closeNav();
      });

      window.addEventListener("resize", () => {
        setNavHeightVar();
        if (window.innerWidth > 768) closeNav(true);
      });
    }

    // Initialize when this script loads
    buildMobileNav();
    setLinks();
    setActiveNav();
    setupMobileNav();
  })();
</script>
