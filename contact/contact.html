<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Nathan Baptista</title>

  <style>
    /* BASE STYLES */
    :root {
      --bg: #181818;
      --fg: #e6e6e6;
      --text-muted: #9aa0a6;
      --accent: #4da3ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* MAIN CONTENT */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      width: 100%;
    }

    .page-title {
      font-size: 2rem;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .contact-content {
      max-width: 600px;
      width: 100%;
    }

    .contact-section {
      margin-bottom: 2rem;
    }

    .contact-section h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .contact-section p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .contact-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      transition: 0.2s ease;
    }

    .contact-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      main {
        padding: 2rem 1.25rem;
      }

      .page-title {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      main {
        padding: 1.5rem 1rem;
      }
    }
  </style>
</head>

<body data-root="..">
  <!-- HEADER: Standalone component with all CSS and JS -->
  <div id="site-header"></div>

  <main>
    <h1 class="page-title">Contact</h1>

    <div class="contact-content">
      <div class="contact-section">
        <h2>Get in Touch</h2>
        <p>I'd love to hear from you. Feel free to reach out through any of these channels:</p>
      </div>

      <div class="contact-section">
        <h2>Email</h2>
        <p><a href="mailto:hello@example.com" class="contact-link">hello@example.com</a></p>
      </div>

      <div class="contact-section">
        <h2>Social</h2>
        <p>
          <a href="https://github.com" target="_blank" class="contact-link">GitHub</a><br>
          <a href="https://twitter.com" target="_blank" class="contact-link">Twitter</a>
        </p>
      </div>
    </div>
  </main>

  <!-- FOOTER: Standalone component with all CSS -->
  <div id="site-footer"></div>

  <script>
    // Load standalone components with their own CSS and JS
    async function loadComponent(targetId, filePath) {
      const target = document.getElementById(targetId);
      if (!target) return;

      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`Failed to load ${filePath}`);
        target.innerHTML = await response.text();
      } catch (err) {
        console.error("Component loading error:", err);
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      const root = document.body.dataset.root || "..";
      loadComponent("site-header", `${root}/components/header-component.html`);
      loadComponent("site-footer", `${root}/components/footer-component.html`);
    });
  </script>
</body>
</html>
