<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Nathan Baptista</title>

  <style>
    :root {
      --bg: #181818;
      --fg: #e6e6e6;
      --card-bg: #1f1f1f;
      --border: #2a2a2a;
      --accent: #4da3ff;
      --active-bg: #2b2b2b;
      --muted: #9aa0a6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .page-head {
      text-align: center;
      margin-bottom: 3rem;
    }

    .page-head h1 {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 1rem;
    }

    .page-head p {
      color: var(--muted);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.15fr;
      gap: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
    }

    .social-list {
      display: grid;
      gap: 0.85rem;
      margin-top: 1rem;
    }

    .social-link {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--fg);
      transition: 0.2s;
    }

    .social-link:hover {
      border-color: var(--accent);
    }

    form {
      display: grid;
      gap: 1rem;
    }

    input, textarea {
      padding: 0.9rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--fg);
    }

    .submit-btn {
      background: var(--accent);
      border: none;
      padding: 0.9rem;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
    }

    @media (max-width: 860px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body data-root=".." data-active="contact">

  <div id="site-header"></div>

  <main>
    <section class="page-head">
      <h1>Contact</h1>
      <p>Reach out anytime.</p>
    </section>

    <section class="contact-grid">
      <div class="card">
        <h2>Social Links</h2>

        <div class="social-list">
          <a class="social-link" href="#">Instagram</a>
          <a class="social-link" href="#">GitHub</a>
          <a class="social-link" href="#">Email</a>
        </div>
      </div>

      <div class="card">
        <h2>Send Message</h2>

        <form>
          <input placeholder="Name" required />
          <input type="email" placeholder="Email" required />
          <textarea placeholder="Message" required></textarea>
          <button class="submit-btn">Send</button>
        </form>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    async function loadComponent(id, path) {
      const el = document.getElementById(id);
      if (!el) return;
      const res = await fetch(path);
      el.innerHTML = await res.text();
    }

    function setLinks() {
      const root = document.body.dataset.root || ".";
      document.querySelectorAll("[data-link]").forEach(el => {
        el.href = root + "/" + el.getAttribute("data-link");
      });
    }

    function setManualActive() {
      const active = document.body.dataset.active;

      document.querySelectorAll(".nav-links a, .mobile-nav a").forEach(link => {
        if ((link.getAttribute("data-link") || "").includes(active)) {
          link.classList.add("active");
        }
      });
    }

    async function init() {
      const root = document.body.dataset.root;

      await loadComponent("site-header", root + "/components/header.html");
      await loadComponent("site-footer", root + "/components/footer.html");

      setLinks();
      setManualActive();
    }

    init();
  </script>

</body>
</html>
