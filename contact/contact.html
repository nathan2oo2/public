<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Nathan Baptista</title>

  <link rel="stylesheet" href="../components/styles.css">

  <style>
    /* PAGE-SPECIFIC STYLES FOR CONTACT */
    .page-title {
      font-size: 2rem;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .contact-content {
      max-width: 600px;
      width: 100%;
    }

    .contact-section {
      margin-bottom: 2rem;
    }

    .contact-section h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .contact-section p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .contact-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      transition: 0.2s ease;
    }

    .contact-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body data-root="..">
  <div id="site-header"></div>

  <main>
    <h1 class="page-title">Contact</h1>

    <div class="contact-content">
      <div class="contact-section">
        <h2>Get in Touch</h2>
        <p>I'd love to hear from you. Feel free to reach out through any of these channels:</p>
      </div>

      <div class="contact-section">
        <h2>Email</h2>
        <p><a href="mailto:hello@example.com" class="contact-link">hello@example.com</a></p>
      </div>

      <div class="contact-section">
        <h2>Social</h2>
        <p>
          <a href="https://github.com" target="_blank" class="contact-link">GitHub</a><br>
          <a href="https://twitter.com" target="_blank" class="contact-link">Twitter</a>
        </p>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script>
    async function loadComponent(targetId, filePath) {
      const target = document.getElementById(targetId);
      if (!target) return;

      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`Failed to load ${filePath}`);
        target.innerHTML = await response.text();

        if (targetId === "site-header") {
          const headerScript = target.querySelector("script");
          if (headerScript) {
            eval(headerScript.textContent);
          }
          setLinks();
          setActiveNav();
        }
      } catch (err) {
        console.error("Component loading error:", err);
      }
    }

    function getRootPath() {
      return document.body.dataset.root || ".";
    }

    function normalizePath(path) {
      return path.replace(/\\/g, "/").replace(/\/+/g, "/");
    }

    function setLinks() {
      const root = getRootPath();

      document.querySelectorAll("[data-link]").forEach((el) => {
        const raw = el.getAttribute("data-link");
        if (!raw) return;
        el.setAttribute("href", normalizePath(`${root}/${raw}`));
      });
    }

    function setActiveNav() {
      const currentPath = window.location.pathname.replace(/\/+$/, "") || "/";
      const currentNormalized = currentPath === "/" ? "/index.html" : currentPath;

      document.querySelectorAll(".nav-links a, .mobile-nav a").forEach((link) => {
        const href = link.getAttribute("href") || "";
        const linkUrl = new URL(href, window.location.origin);
        const linkPath = linkUrl.pathname.replace(/\/+$/, "") || "/";

        if (linkPath === currentNormalized) {
          link.classList.add("active");
        } else {
          link.classList.remove("active");
        }
      });
    }

    async function initLayout() {
      const root = getRootPath();

      await loadComponent("site-header", `${root}/components/header.html`);
      await loadComponent("site-footer", `${root}/components/footer.html`);

      setLinks();
      setActiveNav();
    }

    window.addEventListener("DOMContentLoaded", () => {
      initLayout().catch((err) => console.error(err));
    });
  </script>
</body>
</html>
