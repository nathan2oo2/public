<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nathan Baptista</title>

  <style>
    :root {
      --bg: #181818;
      --fg: #e6e6e6;
      --card-bg: #1f1f1f;
      --border: #2a2a2a;
      --accent: #4da3ff;
      --active-bg: #2b2b2b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV (comes from header but keep styles here) */
    .site-nav {
      width: 100%;
      background: #000;
      border-bottom: 1px solid #111;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      align-items: center;
      padding: 0.5rem 2rem;
    }

    .nav-left {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .logo-icon {
      height: 60px;
      border-radius: 8px;
    }

    .nav-links {
      display: flex;
      gap: 0.6rem;
      list-style: none;
      margin-left: auto;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
      background: rgba(255,255,255,0.05);
    }

    .nav-links a.active {
      color: var(--accent);
      background: rgba(77,163,255,0.15);
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      margin-left: auto;
    }

    .mobile-nav {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #000;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 0;
      opacity: 0;
      transform: translateY(-8px);
      transition: 0.25s;
    }

    .mobile-nav[data-open="true"] {
      max-height: 300px;
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-nav a {
      padding: 0.7rem;
      border-radius: 8px;
      color: white;
      text-decoration: none;
    }

    .mobile-nav a.active {
      background: var(--active-bg);
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 1100px;
      margin: auto;
      padding: 3rem 2rem;
      text-align: center;
    }

    .hero {
      max-width: 700px;
      margin: auto;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 1rem;
    }

    .hero p {
      color: #9aa0a6;
    }

    /* PROJECT CARDS */
    .projects {
      display: grid;
      gap: 1.3rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .project {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      padding: 2rem;
      text-decoration: none;
      color: white;
      border: 1px solid var(--border);
      transition: 0.25s ease;

      background-image: var(--project-bg);
      background-size: cover;
      background-position: center;
      min-height: 210px;
    }

    /* 🔥 DARK TRANSPARENCY LAYER */
    .project::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      transition: background 0.25s ease;
    }

    /* content above overlay */
    .project > * {
      position: relative;
      z-index: 1;
    }

    /* hover */
    .project:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
    }

    /* 🔥 LIGHTEN IMAGE */
    .project:hover::before {
      background: rgba(0, 0, 0, 0.58);
    }

    .project h2 {
      margin-bottom: 0.6rem;
      font-size: 1.3rem;
    }

    .project p {
      color: #b8bcc1;
      font-size: 0.95rem;
    }

    /* FOOTER */
    .site-footer {
      border-top: 1px solid #111;
      background: #111;
      padding: 1rem;
      text-align: center;
      color: #888;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .mobile-menu-btn { display: block; }
      main { padding: 2rem 1.25rem; }
      .hero h1 { font-size: 2rem; }
      .logo-icon { height: 52px; }
    }
  </style>
</head>

<body data-root=".">

  <div id="site-header"></div>

  <main>
    <div class="hero">
      <h1>Hi, I'm Nathan</h1>
      <p>
        A curious developer exploring web, electronics, and clean design.
        I love building simple, useful tools and learning as I go.
      </p>
    </div>

    <div class="projects">

      <a class="project"
         href="jhelo/songbook.html"
         style="--project-bg: url('https://imgs.search.brave.com/CAZbDWtNuS380Pck9lMa6q_Igu3ARCgo4F-VKP3BA0s/rs:fit:860:0:0:0');">
        <h2>Kantarancho Jhelo</h2>
        <p>Digital Konkani songbook.</p>
      </a>

      <a class="project"
         href="mogache-goa/mogache-goa.html"
         style="--project-bg: url('https://imgs.search.brave.com/S_XJBWdSFH9WSVbJ1kBrdDGrBw6TqF9esa1XWDHr8_c/rs:fit:500:0:1:0');">
        <h2>Mogache Goa</h2>
        <p>Catalog of Goa culture.</p>
      </a>

      <a class="project"
         href="tools/tools.html"
         style="--project-bg: url('https://imgs.search.brave.com/30UCb4Yy1iuR7dJrEFRj9QS-9VLZHG__p9mEhyD5JkI/rs:fit:860:0:0:0');">
        <h2>Offline Toolbox</h2>
        <p>Fast offline tools.</p>
      </a>

    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/layout.js"></script>

</body>
</html>
