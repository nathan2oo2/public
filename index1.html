<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nathan Baptista</title>

  <style>
    :root {
      --bg: #181818;
      --fg: #e6e6e6;
      --card-bg: #1f1f1f;
      --border: #2a2a2a;
      --accent: #4da3ff;
      --active-bg: #2b2b2b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    .site-nav {
      width: 100%;
      background: #000;
      border-bottom: 1px solid #111;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      align-items: center;
      padding: 0.5rem 2rem;
    }

    .nav-left {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .logo-icon {
      height: 60px;
    }

    .nav-links {
      display: flex;
      gap: 0.6rem;
      margin-left: auto;
      list-style: none;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
      background: rgba(255,255,255,0.05);
    }

    .nav-links a.active {
      color: var(--accent);
      background: rgba(77,163,255,0.15);
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      margin-left: auto;
    }

    .mobile-nav {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 6px;
      max-height: 0;
      opacity: 0;
      transform: translateY(-8px);
      transition: all 0.25s ease;
    }

    .mobile-nav[data-open="true"] {
      max-height: 300px;
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-nav a {
      padding: 0.7rem;
      border-radius: 8px;
      color: white;
      text-decoration: none;
    }

    .mobile-nav a.active {
      background: var(--active-bg);
    }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: auto;
      padding: 3rem 2rem;
      flex: 1;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 300;
    }

    .hero p {
      color: #9aa0a6;
      max-width: 600px;
      margin: auto;
      line-height: 1.6;
    }

    /* PROJECT CARDS */
    .projects {
      margin-top: 3rem;
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .project {
      position: relative;
      padding: 2rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      text-decoration: none;
      color: white;
      transition: 0.25s ease;

      background-image: var(--project-bg);
      background-size: cover;
      background-position: center;
    }

    /* DARK OVERLAY */
    .project::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      transition: 0.25s ease;
    }

    /* CONTENT ABOVE */
    .project * {
      position: relative;
      z-index: 1;
    }

    /* HOVER EFFECT */
    .project:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 6px 18px rgba(0,0,0,0.7);
    }

    /* 🔥 LIGHTEN IMAGE */
    .project:hover::before {
      background: rgba(0,0,0,0.55);
    }

    .project h2 {
      margin-bottom: 0.5rem;
    }

    .project p {
      color: #bbb;
      font-size: 0.95rem;
    }

    /* FOOTER */
    .site-footer {
      border-top: 1px solid #111;
      padding: 1rem;
      text-align: center;
      background: #111;
      color: #888;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .mobile-menu-btn { display: block; }
    }
  </style>
</head>

<body data-root=".">
  <div id="site-header"></div>

  <main>
    <div class="hero">
      <h1>Hi, I'm Nathan</h1>
      <p>
        A curious developer exploring web, electronics, and clean design.
      </p>
    </div>

    <div class="projects">

      <a class="project" href="jhelo/songbook.html"
         style="--project-bg:url('https://imgs.search.brave.com/CAZbDWtNuS380Pck9lMa6q_Igu3ARCgo4F-VKP3BA0s/rs:fit:860:0:0:0');">
        <h2>Kantarancho Jhelo</h2>
        <p>Digital konkani songbook.</p>
      </a>

      <a class="project" href="mogache-goa/mogache-goa.html"
         style="--project-bg:url('https://imgs.search.brave.com/S_XJBWdSFH9WSVbJ1kBrdDGrBw6TqF9esa1XWDHr8_c/rs:fit:500:0:1:0');">
        <h2>Mogache Goa</h2>
        <p>Catalog of Goa culture.</p>
      </a>

      <a class="project" href="tools/tools.html"
         style="--project-bg:url('https://imgs.search.brave.com/30UCb4Yy1iuR7dJrEFRj9QS-9VLZHG__p9mEhyD5JkI/rs:fit:860:0:0:0');">
        <h2>Offline Toolbox</h2>
        <p>Fast offline tools.</p>
      </a>

    </div>
  </main>

  <div id="site-footer"></div>

  <script>
    async function loadComponent(id, path) {
      const res = await fetch(path);
      document.getElementById(id).innerHTML = await res.text();
    }

    function buildMobileNav() {
      const desktop = document.getElementById("main-nav-links");
      const mobile = document.getElementById("mobile-nav");
      mobile.innerHTML = "";
      desktop.querySelectorAll("a").forEach(a => {
        const m = document.createElement("a");
        m.setAttribute("data-link", a.getAttribute("data-link"));
        m.textContent = a.textContent;
        mobile.appendChild(m);
      });
    }

    function setLinks() {
      const root = document.body.dataset.root;
      document.querySelectorAll("[data-link]").forEach(el => {
        el.href = root + "/" + el.getAttribute("data-link");
      });
    }

    function setActiveNav() {
      const path = window.location.pathname;
      document.querySelectorAll(".nav-links a, .mobile-nav a").forEach(link => {
        if (path.includes(link.getAttribute("href"))) {
          link.classList.add("active");
        }
      });
    }

    function setupMobileNav() {
      const btn = document.getElementById("mobile-menu-btn");
      const nav = document.getElementById("mobile-nav");

      btn.onclick = () => {
        nav.dataset.open = nav.dataset.open === "true" ? "false" : "true";
      };
    }

    async function init() {
      const root = document.body.dataset.root;
      await loadComponent("site-header", root + "/components/header.html");
      await loadComponent("site-footer", root + "/components/footer.html");

      buildMobileNav();
      setLinks();
      setActiveNav();
      setupMobileNav();
    }

    init();
  </script>
</body>
</html>
