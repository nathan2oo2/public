<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nathan Baptista</title>

  <style>
    :root {
      --bg: #181818;
      --fg: #e6e6e6;
      --card-bg: #1f1f1f;
      --border: #2a2a2a;
      --accent: #4da3ff;
      --active-bg: #2b2b2b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
    }

    /* NAVBAR */
    nav {
      width: 100%;
      background-color: #000;
      border-bottom: 1px solid #111;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      padding: 0.5rem 2rem;
    }

    .nav-left {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .logo-icon {
      height: 60px;
      max-width: 150px;
      border-radius: 8px;
      object-fit: contain;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 0.6rem;
      list-style: none;
      margin-left: auto;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
      background: rgba(255,255,255,0.04);
    }

    .nav-links a.active {
      background: var(--active-bg);
      color: #fff;
    }

    /* MOBILE */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--fg);
      font-size: 1.5rem;
      cursor: pointer;
      margin-left: auto;
    }

    .mobile-nav {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #000;
      padding: 1rem 2rem;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      transition: all 0.25s ease;
    }

    .mobile-nav.show {
      display: flex;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .mobile-nav a {
      padding: 0.75rem;
      border-radius: 10px;
      color: var(--fg);
      text-decoration: none;
    }

    .mobile-nav a.active {
      background: var(--active-bg);
    }

    /* MAIN */
    main {
      max-width: 1200px;
      margin: auto;
      padding: 3rem 2rem;
      text-align: center;
    }

    .hero {
      max-width: 700px;
      margin: auto;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: 2.4rem;
      font-weight: 300;
      margin-bottom: 1rem;
    }

    .hero p {
      color: #9aa0a6;
    }

    /* PROJECTS */
    .projects {
      display: grid;
      gap: 1.2rem;
      max-width: 700px;
      margin: auto;
    }

    .project {
      position: relative;
      overflow: hidden;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      text-align: left;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      background-image: var(--card-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 92px;
      display: flex;
      align-items: center;
    }

    .project::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      transition: background 0.22s ease;
    }

    .project > * {
      position: relative;
      z-index: 1;
    }

    .project:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.45);
    }

    .project:hover::before {
      background: rgba(0, 0, 0, 0.52);
    }

    .project a {
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      display: inline-block;
    }

    .project a:hover {
      color: #fff;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .mobile-menu-btn { display: block; }
      .nav-container { padding: 0.5rem 1rem; }
      .mobile-nav { padding: 1rem; }
      main { padding: 2rem 1.25rem; }
      .hero h1 { font-size: 2rem; }
      .logo-icon { height: 52px; max-width: 130px; }
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-container">
      <div class="nav-left">
        <a href="index.html">
          <img src="https://i.ibb.co/bMcm34Lz/Picsart-26-03-17-15-05-45-303.png" class="logo-icon" alt="Nathan Baptista logo">
        </a>

        <ul class="nav-links">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="mogache-goa.html">Mogache Goa</a></li>
          <li><a href="projects.html">Projects</a></li>
        </ul>
      </div>

      <button class="mobile-menu-btn" id="btn">☰</button>
    </div>

    <div class="mobile-nav" id="mobileNav">
      <a href="index.html" class="active">Home</a>
      <a href="mogache-goa.html">Mogache Goa</a>
      <a href="projects.html">Projects</a>
    </div>
  </nav>

  <main>

    <div class="projects">

        <a href="projects.html">Kantarancho Jhelo</a>
      </div>

      <div class="project" style="--card-image: url('https://imgs.search.brave.com/S_XJBWdSFH9WSVbJ1kBrdDGrBw6TqF9esa1XWDHr8_c/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tZWRpYS5pc3RvY2twaG90by5jb20vaWQvNjg3MTI3Nzk0L3Bob3RvL3RyYWRpdGlvbmFsLW9ybmF0ZS1wb3J0dWd1ZXNlLWRlY29yYXRpdmUtdGlsZXMtYXp1bGVqb3MuanBnP3M9NjEyeDYxMiZ3PTAmaz0yMCZjPVNGeHhxTXI0UHFsQjdXeldFeVlfR0I1Ymd1OW41NHhXTlVtTm16T1E3LUE9');">
        <a href="projects.html">Heritage Structures</a>

      <div class="project" style="--card-image: url('https://imgs.search.brave.com/30UCb4Yy1iuR7dJrEFRj9QS-9VLZHG__p9mEhyD5JkI/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4udmVjdG9yc3RvY2suY29tL2kvcHJldmlldy0xeC81NC8yMi9hYnN0cmFjdC1jeWJlcnNwYWNlLWJnLWRpZ2l0YWwtYmluYXJ5LWNvZGUtc2NyZWVuLXZlY3Rvci0yMzk2NTQyMi5qcGc');">
        <a href="tools.html">Offline Toolbox</a>
      </div>
    </div>
  </main>

  <script>
    const btn = document.getElementById('btn');
    const nav = document.getElementById('mobileNav');

    let open = false;

    btn.onclick = (e) => {
      e.stopPropagation();
      open = !open;

      if (open) {
        nav.classList.add('show');
      } else {
        nav.classList.remove('show');
      }
    };

    document.onclick = (e) => {
      if (!e.target.closest('nav')) {
        nav.classList.remove('show');
        open = false;
      }
    };
  </script>

</body>
</html>
