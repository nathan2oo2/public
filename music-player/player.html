<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kantarancho Jhelo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        /* YT Music Theme Variables */
        :root {
            --bg-color: #030303;
            --surface-color: #212121;
            --surface-hover: #383838;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --sidebar-width: 240px;
            --player-width: 340px;
            --yt-red: #ff0000;
            --focus-color: #ffffff;
            --border-color: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-primary); overflow: hidden; display: flex; height: 100vh; width: 100vw; }

        /* Spatial Navigation Focus States (Desktop/TV) */
        .focusable { outline: none; transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s cubic-bezier(0.2, 0, 0, 1), background-color 0.2s ease; }
        .focusable:focus-visible { box-shadow: 0 0 0 3px var(--focus-color); transform: scale(1.05); z-index: 10; }
        .nav-link.focusable:focus-visible, .search-bar.focusable:focus-visible { transform: scale(1.02); box-shadow: 0 0 0 2px var(--focus-color); }
        .card.focusable:focus-visible { box-shadow: none; transform: scale(1.05); }
        .card.focusable:focus-visible .card-img-wrapper { box-shadow: 0 0 0 3px var(--focus-color); }
        #volumeWrapper.focusable:focus-visible, #progressWrapper.focusable:focus-visible { transform: scale(1); box-shadow: 0 0 0 2px var(--yt-red); }

        .offline-dot { width:7px;height:7px;border-radius:50%;background:#4caf50;display:inline-block;margin-right:5px;flex-shrink:0; }
        .card-offline { position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;color:#4caf50; }
        .up-next-panel { width:100%;margin-top:auto;padding-top:16px;border-top:1px solid var(--border-color); }
        .up-next-title { font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary);margin-bottom:10px; }
        .up-next-list { display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;scrollbar-width:thin; }
        .up-next-item { display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .1s; }
        .up-next-item:hover { background:var(--surface-hover); }
        .up-next-item.active-next { background:rgba(255,0,0,0.1); }
        .un-art { width:36px;height:36px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--surface-color); }
        .un-art-ph { width:36px;height:36px;border-radius:4px;flex-shrink:0;background:var(--surface-color);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:var(--text-secondary); }
        .un-info { flex:1;min-width:0; }
        .un-title { font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .un-artist { font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .radio-station { display:flex;flex-direction:column;cursor:pointer;border-radius:8px;background:var(--surface-color);padding:16px;gap:8px;transition:background .15s; }
        .radio-station:hover { background:var(--surface-hover); }
        .radio-station.online { border: 2px solid rgba(255,0,0,0.3); }
        .radio-station-icon { width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:4px; }
        .radio-station h3 { font-size:15px;font-weight:600; }
        .radio-station p { font-size:13px;color:var(--text-secondary); }
        .lib-item { display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:8px;cursor:pointer;transition:background .1s; }
        .lib-item:hover { background:var(--surface-color); }
        .lib-item.active-lib { background:rgba(255,0,0,0.08); }
        .lib-art { width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--surface-color); }
        .lib-art-ph { width:48px;height:48px;border-radius:6px;flex-shrink:0;background:var(--surface-color);display:flex;align-items:center;justify-content:center;color:var(--text-secondary); }
        .lib-info { flex:1;min-width:0; }
        .lib-title { font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .lib-sub { font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px; }
        #library-grid { display:flex;flex-direction:column;gap:4px; }
        .text-sub { color: var(--text-secondary); font-size: 14px; margin-top: 4px; font-weight: 400; line-height: 1.4;}
        .material-symbols-rounded { font-size: 24px; user-select: none; }

        /* 1. LEFT NAVIGATION SIDEBAR */
        .nav-sidebar { width: var(--sidebar-width); background-color: var(--bg-color); display: flex; flex-direction: column; padding: 16px 8px; flex-shrink: 0; border-right: 1px solid var(--border-color); }
        .logo { display: flex; align-items: center; padding: 12px 16px 24px; font-size: 22px; font-weight: 700; gap: 4px; letter-spacing: -0.5px; }
        .logo .material-symbols-rounded { color: var(--yt-red); font-size: 32px; font-variation-settings: 'FILL' 1; }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .nav-link { display: flex; align-items: center; padding: 12px 16px; gap: 16px; color: var(--text-secondary); cursor: pointer; font-weight: 500; font-size: 15px; border-radius: 8px; }
        .nav-link:hover { color: var(--text-primary); }
        .nav-link.active { color: var(--text-primary); background-color: rgba(255,255,255,0.05);}
        .nav-link.active .material-symbols-rounded { font-variation-settings: 'FILL' 1; }

        /* 2. MAIN CONTENT AREA */
        .main-content { flex: 1; overflow-y: auto; position: relative; -webkit-overflow-scrolling: touch; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(3,3,3,0.9); backdrop-filter: blur(10px); padding: 12px 32px; z-index: 10; }
        .search-bar { display: flex; align-items: center; background-color: var(--surface-color); padding: 8px 16px; border-radius: 24px; width: 100%; max-width: 480px; gap: 12px; border: 1px solid transparent; }
        .search-bar:focus-within { border-color: #555; background-color: var(--bg-color); }
        .search-bar input { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 16px; font-weight: 400; }
        .profile-icon { flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%; background-color: #00bcd4; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 500; font-size: 14px; }

        .view-content { display: none; padding: 0 32px 32px 32px; animation: fadeIn 0.3s ease; }
        .view-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Greetings & Mood Pills */
        .greeting-header { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin: 24px 0 16px 0; }
        .mood-container { display: flex; gap: 12px; margin-bottom: 32px; overflow-x: auto; padding: 6px 4px 12px 4px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .mood-container::-webkit-scrollbar { display: none; }
        .mood-pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 24px; font-size: 15px; font-weight: 500; cursor: pointer; white-space: nowrap; scroll-snap-align: start;}

        .section-title { margin-bottom: 20px; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 24px 20px; margin-bottom: 48px; }
        .card { display: flex; flex-direction: column; cursor: pointer; border-radius: 8px; }
        .card-img-wrapper { position: relative; width: 100%; aspect-ratio: 1; margin-bottom: 12px; border-radius: 8px; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .card:hover .play-overlay { opacity: 1; }
        .play-overlay .play-circle { width: 48px; height: 48px; background: rgba(0,0,0,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; transition: transform 0.2s; }
        .card:hover .play-circle { transform: scale(1.1); }
        .play-circle .material-symbols-rounded { font-size: 32px; font-variation-settings: 'FILL' 1; }
        .now-playing-title { font-weight: 700; font-size: 15px; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* 3. RIGHT PLAYER SIDEBAR */
        .player-sidebar { width: var(--player-width); background-color: var(--surface-color); flex-direction: column; display: flex; border-left: 1px solid var(--border-color); }
        .player-header { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .player-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }
        .now-playing-card { background: var(--bg-color); border-radius: 8px; overflow: hidden; }
        .now-playing-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--surface-color); }
        .now-playing-img-ph { width: 100%; aspect-ratio: 1; background: var(--surface-color); display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--text-secondary); }
        .now-playing-info { padding: 16px; }
        .now-playing-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .now-playing-artist { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        .player-controls { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .progress-bar-wrapper { display: flex; flex-direction: column; gap: 6px; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--yt-red); width: 0%; }
        .time-display { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); font-family: monospace; }

        .action-buttons { display: flex; gap: 8px; justify-content: center; }
        .action-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .action-btn:hover { background: rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.3); }
        .action-btn.play-pause-btn { width: 56px; height: 56px; background: var(--yt-red); border: none; }
        .action-btn.play-pause-btn:hover { background: #ff3333; }

        .volume-wrapper { display: flex; align-items: center; gap: 8px; }
        .volume-icon { flex-shrink: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .volume-bar { height: 4px; flex: 1; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; overflow: hidden; }
        .volume-fill { height: 100%; background: var(--yt-red); width: 70%; }

        @media (max-width: 1400px) {
            .player-sidebar { width: 280px; --player-width: 280px; }
        }
        @media (max-width: 1200px) {
            .player-sidebar { display: none; }
        }
    </style>
</head>
<body>
    <!-- LEFT SIDEBAR NAV -->
    <nav class="nav-sidebar" data-section="left">
        <div class="logo">
            <span class="material-symbols-rounded">music_note</span>
            Jhelo
        </div>
        <ul class="nav-links">
            <li class="nav-link active focusable" id="nav-home" data-section="left" data-view="home">
                <span class="material-symbols-rounded">home</span>
                <span>Home</span>
            </li>
            <li class="nav-link focusable" id="nav-explore" data-section="left" data-view="explore">
                <span class="material-symbols-rounded">explore</span>
                <span>Explore</span>
            </li>
            <li class="nav-link focusable" id="nav-library" data-section="left" data-view="library">
                <span class="material-symbols-rounded">library_music</span>
                <span>Library</span>
            </li>
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-content" data-section="middle">
        <div class="top-bar">
            <div class="search-bar focusable" id="searchBar" data-section="middle">
                <span class="material-symbols-rounded">search</span>
                <input type="text" placeholder="Search songs, artists...">
            </div>
            <div class="profile-icon focusable" id="profileIcon" data-section="middle">
                <span id="userInitial">J</span>
            </div>
        </div>

        <!-- HOME VIEW -->
        <div class="view-content active" id="view-home">
            <div class="greeting-header" id="greeting">Good morning</div>
            <div class="mood-container">
                <div class="mood-pill focusable" data-section="middle">All Songs</div>
                <div class="mood-pill focusable" data-section="middle">Favorites</div>
                <div class="mood-pill focusable" data-section="middle">Recent</div>
            </div>
            <div class="section-title">Your Playlist</div>
            <div class="grid-container" id="songsGrid"></div>
        </div>

        <!-- LIBRARY VIEW -->
        <div class="view-content" id="view-library">
            <div class="section-title">Your Library</div>
            <div id="library-grid"></div>
        </div>

        <!-- EXPLORE VIEW -->
        <div class="view-content" id="view-explore">
            <div class="section-title">Explore</div>
            <div class="grid-container" id="exploreGrid"></div>
        </div>
    </div>

    <!-- RIGHT PLAYER SIDEBAR -->
    <aside class="player-sidebar" data-section="right">
        <div class="player-header">
            <div class="player-label">Now Playing</div>
            <div class="now-playing-card">
                <img id="nowPlayingImg" class="now-playing-img" style="display:none;">
                <div id="nowPlayingImgPh" class="now-playing-img-ph">♪</div>
            </div>
            <div class="now-playing-info">
                <div class="now-playing-sub" id="nowPlayingSub">—</div>
                <div class="now-playing-title" id="nowPlayingTitle">Select a song</div>
                <div class="now-playing-artist" id="nowPlayingArtist">—</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="progress-bar-wrapper">
                <div class="progress-bar focusable" id="progressWrapper" data-section="right">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="action-buttons">
                <button class="action-btn focusable" id="prevBtn" data-section="right" title="Previous">
                    <span class="material-symbols-rounded">skip_previous</span>
                </button>
                <button class="action-btn play-pause-btn focusable" id="playPauseBtn" data-section="right" title="Play">
                    <span class="material-symbols-rounded" id="playPauseIcon">play_arrow</span>
                </button>
                <button class="action-btn focusable" id="nextBtn" data-section="right" title="Next">
                    <span class="material-symbols-rounded">skip_next</span>
                </button>
            </div>

            <div class="volume-wrapper">
                <div class="volume-icon">
                    <span class="material-symbols-rounded" id="volumeIcon">volume_up</span>
                </div>
                <div class="volume-bar focusable" id="volumeWrapper" data-section="right">
                    <div class="volume-fill" id="volumeFill"></div>
                </div>
            </div>
        </div>

        <div class="up-next-panel">
            <div class="up-next-title">Up Next</div>
            <div class="up-next-list" id="upNextList"></div>
        </div>
    </aside>

    <audio id="audioPlayer"></audio>

    <script>
        // ==========================================
        // SONG PARSER
        // ==========================================
        class SongParser {
            static parse(content) {
                const songs = [];
                const songBlocks = content.split('===').filter(block => block.trim());

                for (const block of songBlocks) {
                    const lines = block.trim().split('\n');
                    const song = {
                        metadata: {},
                        lyrics: []
                    };

                    let currentSection = null;

                    for (const line of lines) {
                        if (line.startsWith('#')) {
                            const [key, ...valueParts] = line.substring(1).split(':');
                            const value = valueParts.join(':').trim();
                            song.metadata[key] = value;
                        } else if (line.startsWith('--')) {
                            currentSection = line.substring(2).trim();
                        } else if (line.trim()) {
                            song.lyrics.push({
                                text: line,
                                section: currentSection
                            });
                        }
                    }

                    if (Object.keys(song.metadata).length > 0) {
                        songs.push(song);
                    }
                }

                return songs;
            }
        }

        // ==========================================
        // PLAYER STATE
        // ==========================================
        let songs = [];
        let currentSongIndex = 0;
        let isPlaying = false;
        const audio = document.getElementById('audioPlayer');

        // ==========================================
        // LOAD SONGS FROM FILE
        // ==========================================
        async function loadSongs() {
            try {
                const response = await fetch('../audio/songs.txt');
                if (!response.ok) throw new Error('Failed to load songs');
                
                const text = await response.text();
                songs = SongParser.parse(text);
                
                if (songs.length === 0) {
                    console.error('No songs parsed');
                    return;
                }

                renderSongsGrid();
                renderLibrary();
                renderUpNext();
                loadSong(0);
            } catch (error) {
                console.error('Error loading songs:', error);
            }
        }

        // ==========================================
        // RENDER GRID & UI
        // ==========================================
        function renderSongsGrid() {
            const grid = document.getElementById('songsGrid');
            grid.innerHTML = songs.map((song, index) => `
                <div class="card focusable" data-section="middle" data-index="${index}">
                    <div class="card-img-wrapper">
                        ${song.metadata['AA Link'] ? `<img src="${song.metadata['AA Link']}" class="card-img">` : `<div style="width:100%;height:100%;background:var(--surface-color);display:flex;align-items:center;justify-content:center;font-size:48px">♪</div>`}
                        <div class="play-overlay">
                            <div class="play-circle">
                                <span class="material-symbols-rounded">play_arrow</span>
                            </div>
                        </div>
                    </div>
                    <div class="now-playing-title">${song.metadata['Title'] || 'Unknown'}</div>
                    <div class="text-sub">${song.metadata['Artist'] || 'Unknown'}</div>
                </div>
            `).join('');

            // Add click handlers
            document.querySelectorAll('#songsGrid .card').forEach(card => {
                card.addEventListener('click', () => {
                    const index = parseInt(card.dataset.index);
                    loadSong(index);
                });
            });
        }

        function renderLibrary() {
            const lib = document.getElementById('library-grid');
            lib.innerHTML = songs.map((song, index) => `
                <div class="lib-item focusable" data-section="middle" data-index="${index}">
                    ${song.metadata['AA Link'] ? `<img src="${song.metadata['AA Link']}" class="lib-art">` : `<div class="lib-art-ph">♪</div>`}
                    <div class="lib-info">
                        <div class="lib-title">${song.metadata['Title'] || 'Unknown'}</div>
                        <div class="lib-sub">${song.metadata['Artist'] || 'Unknown'}</div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('#library-grid .lib-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    loadSong(index);
                });
            });
        }

        function renderUpNext() {
            const list = document.getElementById('upNextList');
            const nextIndex = (currentSongIndex + 1) % songs.length;
            
            let html = '';
            for (let i = 0; i < Math.min(5, songs.length - 1); i++) {
                const idx = (currentSongIndex + 1 + i) % songs.length;
                const song = songs[idx];
                const isActive = idx === nextIndex;
                html += `
                    <div class="up-next-item ${isActive ? 'active-next' : ''}" data-index="${idx}">
                        ${song.metadata['AA Link'] ? `<img src="${song.metadata['AA Link']}" class="un-art">` : `<div class="un-art-ph">♪</div>`}
                        <div class="un-info">
                            <div class="un-title">${song.metadata['Title'] || 'Unknown'}</div>
                            <div class="un-artist">${song.metadata['Artist'] || 'Unknown'}</div>
                        </div>
                    </div>
                `;
            }
            list.innerHTML = html;

            document.querySelectorAll('#upNextList .up-next-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    loadSong(index);
                });
            });
        }

        // ==========================================
        // LOAD SONG
        // ==========================================
        function loadSong(index) {
            if (index < 0 || index >= songs.length) return;
            
            currentSongIndex = index;
            const song = songs[index];

            // Update UI
            document.getElementById('nowPlayingTitle').textContent = song.metadata['Title'] || 'Unknown';
            document.getElementById('nowPlayingArtist').textContent = song.metadata['Artist'] || 'Unknown';
            document.getElementById('nowPlayingSub').textContent = song.metadata['Genre'] || '';

            const img = document.getElementById('nowPlayingImg');
            const imPh = document.getElementById('nowPlayingImgPh');
            if (song.metadata['AA Link']) {
                img.src = song.metadata['AA Link'];
                img.style.display = 'block';
                imPh.style.display = 'none';
            } else {
                img.style.display = 'none';
                imPh.style.display = 'flex';
            }

            // Load audio
            const audioFile = song.metadata['File'];
            if (audioFile) {
                audio.src = '../audio/' + audioFile;
            }

            audio.load();
            if (isPlaying) audio.play();

            renderUpNext();
        }

        // ==========================================
        // PLAYBACK CONTROLS
        // ==========================================
        function formatTime(seconds) {
            if (!isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = document.getElementById('playPauseIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeWrapper = document.getElementById('volumeWrapper');
        const volumeFill = document.getElementById('volumeFill');
        const volumeIcon = document.getElementById('volumeIcon');

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playPauseIcon.textContent = 'play_arrow';
                isPlaying = false;
            } else {
                audio.play();
                playPauseIcon.textContent = 'pause';
                isPlaying = true;
            }
        });

        prevBtn.addEventListener('click', () => {
            loadSong((currentSongIndex - 1 + songs.length) % songs.length);
            if (isPlaying) audio.play();
        });

        nextBtn.addEventListener('click', () => {
            loadSong((currentSongIndex + 1) % songs.length);
            if (isPlaying) audio.play();
        });

        progressWrapper.addEventListener('click', (e) => {
            const rect = progressWrapper.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });

        volumeWrapper.addEventListener('click', (e) => {
            const rect = volumeWrapper.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.volume = Math.max(0, Math.min(1, percent));
            updateVolumeUI();
        });

        function updateVolumeUI() {
            const vol = audio.volume;
            volumeFill.style.width = (vol * 100) + '%';
            if (vol === 0) volumeIcon.textContent = 'volume_off';
            else if (vol < 0.5) volumeIcon.textContent = 'volume_down';
            else volumeIcon.textContent = 'volume_up';
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressFill.style.width = (audio.currentTime / audio.duration) * 100 + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            loadSong((currentSongIndex + 1) % songs.length);
            audio.play();
        });

        // ==========================================
        // NAVIGATION & VIEW SWITCHING
        // ==========================================
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                
                const viewId = link.dataset.view;
                document.querySelectorAll('.view-content').forEach(view => view.classList.remove('active'));
                document.getElementById(`view-${viewId}`).classList.add('active');
            });
        });

        // ==========================================
        // GREETING
        // ==========================================
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting = 'Good morning';
            if (hour >= 12 && hour < 18) greeting = 'Good afternoon';
            else if (hour >= 18) greeting = 'Good evening';
            document.getElementById('greeting').textContent = greeting;
        }

        // ==========================================
        // SPATIAL NAVIGATION
        // ==========================================
        document.addEventListener('keydown', (e) => {
            if (window.innerWidth <= 850) return;
            const allowedKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'];
            if (!allowedKeys.includes(e.key)) return;

            const current = document.activeElement;

            if (current && current.id === 'volumeWrapper' && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                e.preventDefault();
                let vol = audio.volume;
                vol += (e.key === 'ArrowRight') ? 0.1 : -0.1;
                vol = Math.max(0, Math.min(1, vol));
                audio.volume = vol;
                updateVolumeUI();
                return;
            }

            if (current && current.id === 'progressWrapper' && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                e.preventDefault();
                if(audio.duration) {
                    let percent = audio.currentTime / audio.duration;
                    percent += (e.key === 'ArrowRight') ? 0.05 : -0.05;
                    percent = Math.max(0, Math.min(1, percent));
                    audio.currentTime = percent * audio.duration;
                }
                return;
            }

            if (current && current.classList.contains('action-btn') && e.key === 'ArrowUp') { e.preventDefault(); return; }

            if (e.key === 'Enter') {
                if (current && current.classList.contains('focusable')) {
                    current.click();
                    if(current.id === 'searchBar') current.querySelector('input').focus();
                }
                return;
            }

            e.preventDefault();

            let explicitMatch = null;
            if (current && current.classList.contains('mood-pill') && e.key === 'ArrowUp') explicitMatch = document.getElementById('searchBar');
            else if (current && current.id === 'searchBar' && e.key === 'ArrowRight') explicitMatch = document.getElementById('profileIcon');
            else if (current && current.id === 'profileIcon' && e.key === 'ArrowLeft') explicitMatch = document.getElementById('searchBar');
            else if (current && current.id === 'profileIcon' && e.key === 'ArrowRight') explicitMatch = document.getElementById('playPauseBtn');

            if (explicitMatch) { explicitMatch.focus(); explicitMatch.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' }); return; }

            const focusables = Array.from(document.querySelectorAll('.focusable')).filter(el => {
                const rect = el.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0 && window.getComputedStyle(el).display !== 'none';
            });

            if (!focusables.includes(current)) { if (focusables.length > 0) focusables[0].focus(); return; }

            const currentRect = current.getBoundingClientRect();
            const currentCenter = { x: currentRect.left + currentRect.width / 2, y: currentRect.top + currentRect.height / 2 };

            let bestMatchSame = null, shortestDistSame = Infinity, bestMatchOther = null, shortestDistOther = Infinity;
            const currentSection = current.dataset.section;

            focusables.forEach(target => {
                if (target === current) return;
                const targetRect = target.getBoundingClientRect();
                const targetCenter = { x: targetRect.left + targetRect.width / 2, y: targetRect.top + targetRect.height / 2 };
                const dx = targetCenter.x - currentCenter.x, dy = targetCenter.y - currentCenter.y;
                let isDirectionMatch = false;
                if (e.key === 'ArrowRight' && dx > Math.abs(dy)) isDirectionMatch = true;
                if (e.key === 'ArrowLeft' && -dx > Math.abs(dy)) isDirectionMatch = true;
                if (e.key === 'ArrowDown' && dy > Math.abs(dx)) isDirectionMatch = true;
                if (e.key === 'ArrowUp' && -dy > Math.abs(dx)) isDirectionMatch = true;
                if (isDirectionMatch) {
                    const distance = Math.hypot(dx, dy);
                    if (target.dataset.section === currentSection) { if (distance < shortestDistSame) { shortestDistSame = distance; bestMatchSame = target; } }
                    else { if (distance < shortestDistOther) { shortestDistOther = distance; bestMatchOther = target; } }
                }
            });

            let finalMatch = bestMatchSame;
            if (!finalMatch && bestMatchOther) {
                const targetSection = bestMatchOther.dataset.section;
                if (targetSection === 'left') finalMatch = document.getElementById('nav-home');
                else if (targetSection === 'right') finalMatch = document.getElementById('playPauseBtn');
                else if (targetSection === 'middle') { if (currentSection === 'left') finalMatch = document.querySelector('.card.focusable'); else finalMatch = bestMatchOther; }
            }
            if (finalMatch) { finalMatch.focus(); finalMatch.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' }); }
        });

        // ==========================================
        // INIT
        // ==========================================
        window.addEventListener('load', () => {
            updateGreeting();
            loadSongs();
            audio.volume = 0.7;
            updateVolumeUI();
            if (window.innerWidth > 850) document.getElementById('nav-home').focus();
        });
    </script>
</body>
</html>
