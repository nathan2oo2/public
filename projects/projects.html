<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projects - Nathan Baptista</title>

  <style>
    /* BASE STYLES */
    :root {
      --bg: #181818;
      --fg: #e6e6e6;
      --card-bg: #1f1f1f;
      --border: #2a2a2a;
      --accent: #4da3ff;
      --text-muted: #9aa0a6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* MAIN CONTENT */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      width: 100%;
    }

    .projects-header {
      margin-bottom: 3rem;
    }

    .page-title {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 1rem;
    }

    .page-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
    }

    /* FILTERS SECTION */
    .filters-section {
      margin-bottom: 3rem;
    }

    .filters-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 1rem;
      display: block;
    }

    .filters-container {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.625rem 1.25rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      text-transform: capitalize;
      font-weight: 500;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* PROJECTS GRID */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .project-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(77, 163, 255, 0.15);
    }

    .project-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .project-content {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }

    .project-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--fg);
      margin: 0;
    }

    .project-description {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
    }

    .project-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      gap: 1rem;
    }

    .project-status {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      border-radius: 4px;
      background: rgba(77, 163, 255, 0.1);
      color: var(--accent);
    }

    .project-status.active {
      background: rgba(76, 175, 80, 0.1);
      color: #4caf50;
    }

    .project-status.in-progress {
      background: rgba(255, 193, 7, 0.1);
      color: #ffc107;
    }

    .project-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .tag {
      display: inline-block;
      background: rgba(77, 163, 255, 0.1);
      color: var(--accent);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      font-size: 0.75rem;
      text-transform: capitalize;
      border: 1px solid rgba(77, 163, 255, 0.2);
    }

    .project-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 0.75rem;
    }

    .project-link:hover {
      transform: translateX(4px);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: var(--fg);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      main {
        padding: 2rem 1.25rem;
      }

      .page-title {
        font-size: 2rem;
      }

      .projects-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .filters-container {
        gap: 0.5rem;
      }

      .filter-btn {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 480px) {
      main {
        padding: 1.5rem 1rem;
      }

      .page-title {
        font-size: 1.75rem;
      }

      .page-subtitle {
        font-size: 0.9rem;
      }

      .filters-container {
        gap: 0.5rem;
      }

      .filter-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }

      .project-content {
        padding: 1rem;
      }

      .project-image {
        height: 150px;
      }
    }
  </style>
</head>

<body data-root="..">
  <!-- HEADER: Standalone component -->
  <div id="site-header"></div>

  <main>
    <div class="projects-header">
      <h1 class="page-title">Projects</h1>
      <p class="page-subtitle">A collection of web, cultural, and creative projects I've built and contributed to.</p>
    </div>

    <!-- FILTERS -->
    <div class="filters-section">
      <label class="filters-label">Filter by</label>
      <div class="filters-container" id="filters-container">
        <!-- Populated by JavaScript -->
      </div>
    </div>

    <!-- PROJECTS GRID -->
    <div class="projects-grid" id="projects-grid">
      <!-- Populated by JavaScript -->
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="empty-state" style="display: none;">
      <h3>No projects found</h3>
      <p>Try adjusting your filters to see more projects.</p>
    </div>
  </main>

  <!-- FOOTER: Standalone component -->
  <div id="site-footer"></div>

  <script>
    let allProjects = [];
    let currentFilter = 'popular';

    // Load projects from JSON
    async function loadProjects() {
      try {
        const response = await fetch('../projects.json');
        if (!response.ok) throw new Error('Failed to load projects');
        const data = await response.json();
        allProjects = data.projects;
        
        initializeFilters();
        filterProjects(currentFilter);
      } catch (err) {
        console.error('Error loading projects:', err);
      }
    }

    // Initialize filter buttons
    function initializeFilters() {
      const container = document.getElementById('filters-container');
      
      // Popular filter
      const popularBtn = document.createElement('button');
      popularBtn.className = 'filter-btn active';
      popularBtn.textContent = 'Popular';
      popularBtn.dataset.filter = 'popular';
      popularBtn.addEventListener('click', () => filterByPopular());
      container.appendChild(popularBtn);

      // Category filters
      const categories = [...new Set(allProjects.map(p => p.category))];
      categories.forEach(category => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = category;
        btn.dataset.filter = `category-${category}`;
        btn.addEventListener('click', () => filterByCategory(category));
        container.appendChild(btn);
      });

      // Status filters
      const statuses = [...new Set(allProjects.map(p => p.status))];
      statuses.forEach(status => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = status;
        btn.dataset.filter = `status-${status}`;
        btn.addEventListener('click', () => filterByStatus(status));
        container.appendChild(btn);
      });

      // All projects filter
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn';
      allBtn.textContent = 'All';
      allBtn.dataset.filter = 'all';
      allBtn.addEventListener('click', () => filterAll());
      container.appendChild(allBtn);
    }

    // Filter functions
    function filterByPopular() {
      currentFilter = 'popular';
      const filtered = allProjects.filter(p => p.popular === 1);
      renderProjects(filtered);
      updateActiveButton('popular');
    }

    function filterByCategory(category) {
      currentFilter = `category-${category}`;
      const filtered = allProjects.filter(p => p.category === category);
      renderProjects(filtered);
      updateActiveButton(`category-${category}`);
    }

    function filterByStatus(status) {
      currentFilter = `status-${status}`;
      const filtered = allProjects.filter(p => p.status === status);
      renderProjects(filtered);
      updateActiveButton(`status-${status}`);
    }

    function filterAll() {
      currentFilter = 'all';
      renderProjects(allProjects);
      updateActiveButton('all');
    }

    function filterProjects(filter) {
      if (filter === 'popular') {
        filterByPopular();
      } else if (filter.startsWith('category-')) {
        filterByCategory(filter.split('-')[1]);
      } else if (filter.startsWith('status-')) {
        filterByStatus(filter.split('-')[1]);
      } else {
        filterAll();
      }
    }

    // Update active button
    function updateActiveButton(activeFilter) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.filter === activeFilter) {
          btn.classList.add('active');
        }
      });
    }

    // Render projects
    function renderProjects(projects) {
      const grid = document.getElementById('projects-grid');
      const emptyState = document.getElementById('empty-state');

      if (projects.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';
      grid.innerHTML = '';

      projects.forEach(project => {
        const card = document.createElement('a');
        card.href = project.link;
        card.className = 'project-card';
        card.style.textDecoration = 'none';
        card.style.color = 'inherit';

        const statusClass = project.status.toLowerCase().replace(' ', '-');
        const statusText = project.status === 'In Progress' ? 'in-progress' : project.status.toLowerCase();

        card.innerHTML = `
          <img src="${project.image}" alt="${project.title}" class="project-image">
          <div class="project-content">
            <h3 class="project-title">${project.title}</h3>
            <p class="project-description">${project.description}</p>
            <div class="project-tags">
              ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
            <div class="project-meta">
              <span class="project-status ${statusText}">${project.status}</span>
            </div>
            ${project.link !== '#' ? '<span class="project-link">View Project →</span>' : ''}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    // Load standalone components
    async function loadComponent(targetId, filePath) {
      const target = document.getElementById(targetId);
      if (!target) return;

      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`Failed to load ${filePath}`);
        target.innerHTML = await response.text();
        
        const scripts = target.querySelectorAll("script");
        scripts.forEach((script) => {
          const newScript = document.createElement("script");
          newScript.textContent = script.textContent;
          target.appendChild(newScript);
        });
      } catch (err) {
        console.error("Component loading error:", err);
      }
    }

    // Initialize on load
    window.addEventListener("DOMContentLoaded", () => {
      const root = document.body.dataset.root || "..";
      loadComponent("site-header", `${root}/components/header.html`);
      loadComponent("site-footer", `${root}/components/footer.html`);
      loadProjects();
    });
  </script>
</body>
</html>
